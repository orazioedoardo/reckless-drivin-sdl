name: Package

on: [workflow_dispatch]

jobs:
  package-linux:
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: x86_64, os: ubuntu-22.04 }
          - { name: aarch64, os: ubuntu-22.04-arm }

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Compile Linux ${{ matrix.platform.name }} app
          sudo apt update
          sudo apt install -y desktop-file-utils libsdl2-dev
          ./build-linux-app.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build-${{ matrix.platform.name }}
          path: RecklessDrivin-*-linux-${{ matrix.platform.name }}.AppImage
