name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install SDL2
        run: brew install sdl2
      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          cmake --build .
      - name: Verify app bundle
        run: |
          test -d build/RecklessDrivin.app
          test -f build/RecklessDrivin.app/Contents/MacOS/RecklessDrivin
          test -f build/RecklessDrivin.app/Contents/Resources/Data
          test -f build/RecklessDrivin.app/Contents/Resources/Reckless.icns

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          cmake --build .
      - name: Verify binary
        run: |
          test -f build/RecklessDrivin
          test -f build/Data

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install SDL2 via vcpkg
        run: vcpkg install sdl2:x64-windows
      - name: Build
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release
      - name: Verify binary
        run: |
          if (!(Test-Path "build/Release/RecklessDrivin.exe")) { exit 1 }
          if (!(Test-Path "build/Release/Data")) { exit 1 }
